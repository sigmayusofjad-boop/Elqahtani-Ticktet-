<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام تذاكر الدعم الفني</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }
        
        .container {
            text-align: center;
            padding: 40px;
        }
        
        h1 {
            font-size: 48px;
            margin-bottom: 20px;
        }
        
        p {
            font-size: 20px;
            opacity: 0.9;
        }
        
        .ticket-icon {
            font-size: 80px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="ticket-icon">🎫</div>
        <h1>نظام تذاكر الدعم الفني</h1>
        <p>هذه الصفحة الرئيسية لنظام التذاكر</p>
        <p style="margin-top: 20px; font-size: 16px; opacity: 0.7;">
            ⚠️ الترانستربتس تُرفع تلقائياً من البوت
        </p>
    </div>
</body>
</html>
